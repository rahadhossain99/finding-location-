<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>প্রো নেভিগেটর V6 - ন্যাচারাল গ্রিন</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet & Routing -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Hind Siliguri', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] },
                    colors: { brand: { 50: '#ecfdf5', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857' } },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slideUp': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
                        slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <style>
        :root { --panel-bg: rgba(255, 255, 255, 0.90); --panel-border: rgba(16, 185, 129, 0.2); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Hind Siliguri', sans-serif; background: #0f172a; touch-action: none;}
        
        #map-container { position: relative; width: 100vw; height: 100vh; perspective: 1200px; overflow: hidden; background: #0f172a;}
        #map { height: 100%; width: 100%; z-index: 1; transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1); transform-origin: center center; }
        
        /* Pseudo 3D Mode */
        .map-3d-mode { transform: rotateX(55deg) scale(1.3) translateY(-10%); border-radius: 40px; box-shadow: 0 -20px 50px rgba(0,0,0,0.5); }

        /* আল্ট্রা প্রিমিয়াম গ্লাস প্যানেল - সবুজ থিম */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 2px solid var(--panel-border);
            box-shadow: 0 30px 60px -12px rgba(4, 120, 87, 0.15), 0 0 20px rgba(255,255,255,0.6) inset;
            border-radius: 36px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ইনপুট ফিল্ড (বড় সাইজ) */
        .search-input-box { display: flex; align-items: center; background: rgba(241, 245, 249, 0.8); border: 2px solid rgba(226, 232, 240, 0.9); border-radius: 22px; padding: 16px 22px; transition: all 0.3s ease; }
        .search-input-box:focus-within { background: #ffffff; border-color: #10b981; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.15); transform: translateY(-2px); }
        .search-input-box input { border: none; background: transparent; outline: none; width: 100%; font-size: 16px; color: #1e293b; font-weight: 700; }
        .search-input-box input::placeholder { color: #94a3b8; font-weight: 500; }

        /* ট্রাভেল মোড (সবুজ) */
        .travel-mode-container { display: flex; background: rgba(241, 245, 249, 0.9); padding: 8px; border-radius: 28px; box-shadow: inset 0 2px 8px rgba(0,0,0,0.05); }
        .travel-mode-btn { flex: 1; height: 50px; border-radius: 22px; display: flex; justify-content: center; align-items: center; color: #64748b; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 20px; position: relative; z-index: 2;}
        .travel-mode-btn.active { color: white; background: linear-gradient(135deg, #34d399, #059669); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.3); transform: scale(1.05); }

        /* কুইক এক্সপ্লোর চিপস */
        .explore-chip { padding: 10px 18px; background: white; border: 2px solid #e2e8f0; border-radius: 24px; font-size: 14px; font-weight: 700; color: #475569; cursor: pointer; transition: 0.3s; white-space: nowrap; box-shadow: 0 4px 6px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 8px; }
        .explore-chip:hover { background: #ecfdf5; border-color: #10b981; color: #059669; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(16, 185, 129, 0.15); }

        /* লাইভ ইউজার ব্লিপ (সবুজ) */
        .user-pulse-container { position: relative; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; }
        .pulse-loc { width: 22px; height: 22px; background: #10b981; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 20px rgba(16, 185, 129, 0.8); z-index: 2; position: relative; }
        .pulse-loc::after { content: ''; position: absolute; top:-3px; left:-3px; right:-3px; bottom:-3px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); animation: spin 2s linear infinite; border-top-color: transparent; }
        .pulse-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: rgba(16, 185, 129, 0.4); animation: pulseAnim 2.5s infinite cubic-bezier(0.0, 0.0, 0.2, 1); z-index: 1; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseAnim { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        /* ডেক্সটপ ও মোবাইল লেআউট */
        #mainPanel { position: absolute; top: 20px; left: 20px; width: 450px; z-index: 1000; max-height: calc(100vh - 40px); display: flex; flex-direction: column; overflow: hidden; }
        @media (max-width: 768px) {
            #mainPanel { width: calc(100vw - 20px); top: auto; bottom: 20px; left: 10px; max-height: 85vh; border-radius: 36px; }
            .panel-drag-handle { width: 50px; height: 6px; background: #cbd5e1; border-radius: 10px; margin: 12px auto; display: block; }
        }
        @media (min-width: 769px) { .panel-drag-handle { display: none; } }

        #panelOpenBtn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px); z-index: 999; opacity: 0; transition: all 0.5s; }
        #panelOpenBtn.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        #mainPanel.hidden-panel { transform: translateY(120%); opacity: 0; pointer-events: none; }

        /* ফ্লোটিং বাটনস */
        .fab-container { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 16px; z-index: 900; }
        .map-fab {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); width: 56px; height: 56px; border-radius: 22px; 
            display: flex; justify-content: center; align-items: center; font-size: 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.3s; color: #475569; border: 2px solid rgba(255,255,255,0.8);
        }
        .map-fab:hover { background: white; transform: scale(1.1); box-shadow: 0 15px 30px rgba(16,185,129,0.2); color: #10b981; border-color:#10b981; }
        .map-fab.active-3d { background: #10b981; color: white; border-color: #059669; }
        
        /* উইজেটস (Weather & Speed) */
        .top-widgets { position: absolute; top: 20px; right: 20px; z-index: 900; display: flex; gap: 12px; flex-direction: column; align-items: flex-end; }
        .widget-box { background: rgba(15, 23, 42, 0.85); color: white; padding: 12px 18px; border-radius: 22px; font-family: 'Outfit'; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(10px); border: 2px solid rgba(16,185,129,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.3s; }
        #speedometer { transform: scale(0); transform-origin: right center;}
        #speedometer.show { transform: scale(1); }

        /* স্মার্ট লোকেশন ডিটেইলস (Bottom Sheet) */
        #placeDetailSheet {
            position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px;
            z-index: 2000; transition: bottom 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #placeDetailSheet.show { bottom: 20px; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #064e3b; backdrop-filter: blur(10px); color: white; padding: 16px 32px; border-radius: 50px; font-weight: 600; font-size: 16px; z-index: 9999; transition: top 0.5s; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(6,78,59,0.4); border: 2px solid #10b981;}
        #toast.show { top: 30px; }

        .leaflet-control-attribution, .leaflet-routing-container, .leaflet-control-zoom { display: none !important; }
        #overlay { position: fixed; top:0; left:0; width:100vw; height:100vh; background: rgba(15, 23, 42, 0.7); z-index: 1500; backdrop-filter: blur(8px); display: none; opacity: 0; transition: 0.4s;}
        #overlay.show { display: block; opacity: 1; }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <div id="map-container">
        <!-- মেইন ম্যাপ -->
        <div id="map"></div>
    </div>

    <!-- টপ উইজেটস (Speed & Weather) -->
    <div class="top-widgets">
        <div class="widget-box" id="weatherWidget">
            <i class="fa-solid fa-cloud-sun text-yellow-400 text-2xl"></i>
            <div>
                <div class="text-2xl font-black" id="tempValue">--°C</div>
            </div>
        </div>
        <div class="widget-box" id="speedometer">
            <div class="text-3xl font-black text-emerald-400" id="speedValue">0</div>
            <div class="text-[11px] text-gray-300 font-bold uppercase tracking-widest leading-tight">Km/h<br>Speed</div>
        </div>
    </div>

    <!-- ডার্ক ওভারলে -->
    <div id="overlay" onclick="closeModals()"></div>

    <!-- প্যানেল ওপেন বাটন (যখন হাইড থাকবে) -->
    <button id="panelOpenBtn" onclick="togglePanel()" class="glass-panel px-8 py-4 text-emerald-600 font-black flex items-center gap-3 shadow-2xl hover:scale-105 text-xl border-emerald-400">
        <i class="fa-solid fa-layer-group text-2xl"></i> নেভিগেশন খুলুন
    </button>

    <!-- ফ্লোটিং বাটনস (ডান দিকে) -->
    <div class="fab-container">
        <div class="map-fab" onclick="document.getElementById('layerModal').classList.add('show'); document.getElementById('overlay').classList.add('show');" title="ম্যাপ স্টাইল">
            <i class="fa-solid fa-layer-group"></i>
        </div>
        <div class="map-fab text-blue-600" onclick="locateMe()" title="আমার লোকেশন">
            <i class="fa-solid fa-crosshairs text-2xl"></i>
        </div>
        <!-- 3D Toggle Button -->
        <div class="map-fab font-black text-xl" id="btn3D" onclick="toggle3D()" title="থ্রিডি মোড">
            3D
        </div>
        <div class="flex flex-col gap-2 mt-2 bg-white/90 p-2 rounded-[24px] backdrop-blur-md border border-gray-200">
            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center cursor-pointer hover:bg-emerald-50 hover:text-emerald-600 shadow-sm transition" onclick="map.zoomIn()">
                <i class="fa-solid fa-plus text-xl"></i>
            </div>
            <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center cursor-pointer hover:bg-emerald-50 hover:text-emerald-600 shadow-sm transition" onclick="map.zoomOut()">
                <i class="fa-solid fa-minus text-xl"></i>
            </div>
        </div>
    </div>

    <!-- টোস্ট নোটিফিকেশন -->
    <div id="toast"><i class="fa-solid fa-bolt text-yellow-400"></i> <span id="toastMsg">মেসেজ</span></div>

    <!-- স্মার্ট লোকেশন ডিটেইলস (Bottom Sheet - On Map Click) -->
    <div id="placeDetailSheet" class="glass-panel p-6 border-2 border-emerald-300">
        <div class="flex justify-between items-start mb-5">
            <div class="flex-1 pr-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="bg-emerald-100 text-emerald-700 text-[11px] font-black uppercase px-3 py-1 rounded-full tracking-widest border border-emerald-200" id="placeType">নির্বাচিত স্থান</span>
                </div>
                <h3 class="text-2xl font-black text-gray-800 leading-tight" id="placeNameTitle">খোঁজা হচ্ছে...</h3>
                <p class="text-[15px] text-gray-500 font-medium mt-1.5 line-clamp-2" id="placeAddress">অনুগ্রহ করে অপেক্ষা করুন...</p>
            </div>
            <button onclick="closePlaceDetails()" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-red-100 hover:text-red-500 shrink-0 text-xl transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
            <button onclick="setClickedAs('start')" class="bg-gray-100 hover:bg-gray-200 text-gray-800 py-3.5 rounded-2xl font-black text-[15px] flex items-center justify-center gap-2 transition border border-gray-200">
                <i class="fa-solid fa-location-arrow text-blue-500 text-lg"></i> এখান থেকে শুরু
            </button>
            <button onclick="setClickedAs('dest')" class="bg-emerald-600 hover:bg-emerald-700 text-white py-3.5 rounded-2xl font-black text-[15px] flex items-center justify-center gap-2 transition shadow-lg shadow-emerald-600/30">
                <i class="fa-solid fa-flag-checkered text-white text-lg"></i> গন্তব্য বানান
            </button>
        </div>
        
        <button onclick="openStreetView()" class="w-full bg-gradient-to-r from-gray-800 to-gray-900 hover:from-black hover:to-black text-white py-4 rounded-2xl font-black text-[16px] flex items-center justify-center gap-2 transition shadow-xl">
            <i class="fa-solid fa-street-view text-2xl text-emerald-400"></i> ৩৬০° স্ট্রিট ভিউ দেখুন
        </button>
    </div>

    <!-- ম্যাপ স্টাইল প্যানেল (সবগুলো অপশনসহ) -->
    <div id="layerModal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center pointer-events-none">
        <div class="bg-white/95 backdrop-blur-xl p-6 md:p-8 rounded-[36px] w-[95%] max-w-2xl shadow-2xl pointer-events-auto border-2 border-emerald-100 transition-all transform scale-90 opacity-0" id="layerModalContent">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-black text-gray-800 font-outfit">ম্যাপের ধরন</h2>
                <button onclick="closeModals()" class="w-12 h-12 rounded-full bg-gray-100 text-gray-500 hover:bg-red-500 hover:text-white flex justify-center items-center text-xl transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <!-- ৬টি ম্যাপ লেয়ার -->
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div class="border-4 border-transparent rounded-3xl overflow-hidden cursor-pointer active border-emerald-500 shadow-[0_0_0_4px_rgba(16,185,129,0.2)] relative" onclick="setMapStyle('street', this)">
                    <img src="https://mt1.google.com/vt/lyrs=m&x=1&y=1&z=2" class="w-full h-[100px] object-cover">
                    <div class="absolute bottom-0 w-full bg-black/70 text-white text-center py-2 text-[13px] font-black uppercase tracking-wider">Street View</div>
                </div>
                <div class="border-4 border-transparent rounded-3xl overflow-hidden cursor-pointer relative" onclick="setMapStyle('satellite', this)">
                    <img src="https://mt1.google.com/vt/lyrs=s&x=1&y=1&z=2" class="w-full h-[100px] object-cover">
                    <div class="absolute bottom-0 w-full bg-black/70 text-white text-center py-2 text-[13px] font-black uppercase tracking-wider">Satellite</div>
                </div>
                <div class="border-4 border-transparent rounded-3xl overflow-hidden cursor-pointer relative" onclick="setMapStyle('hybrid', this)">
                    <img src="https://mt1.google.com/vt/lyrs=s,h&x=1&y=1&z=2" class="w-full h-[100px] object-cover">
                    <div class="absolute bottom-0 w-full bg-black/70 text-white text-center py-2 text-[13px] font-black uppercase tracking-wider">Hybrid Pro</div>
                </div>
                <!-- Re-added Terrain -->
                <div class="border-4 border-transparent rounded-3xl overflow-hidden cursor-pointer relative" onclick="setMapStyle('terrain', this)">
                    <img src="https://mt1.google.com/vt/lyrs=p&x=1&y=1&z=2" class="w-full h-[100px] object-cover">
                    <div class="absolute bottom-0 w-full bg-black/70 text-white text-center py-2 text-[13px] font-black uppercase tracking-wider">Terrain / পাহাড়</div>
                </div>
                <!-- Re-added OSM Classic -->
                <div class="border-4 border-transparent rounded-3xl overflow-hidden cursor-pointer relative" onclick="setMapStyle('osm', this)">
                    <div class="w-full h-[100px] bg-[#f8f4f0] flex justify-center items-center text-emerald-600 text-4xl"><i class="fa-solid fa-map"></i></div>
                    <div class="absolute bottom-0 w-full bg-black/70 text-white text-center py-2 text-[13px] font-black uppercase tracking-wider">Classic OSM</div>
                </div>
                <div class="border-4 border-transparent rounded-3xl overflow-hidden cursor-pointer relative" onclick="setMapStyle('dark', this)">
                    <div class="w-full h-[100px] bg-slate-900 flex justify-center items-center text-indigo-400 text-4xl"><i class="fa-solid fa-moon"></i></div>
                    <div class="absolute bottom-0 w-full bg-black/70 text-white text-center py-2 text-[13px] font-black uppercase tracking-wider">Night Mode</div>
                </div>
            </div>
        </div>
    </div>

    <!-- প্রো কন্ট্রোল প্যানেল (মেইন UI) -->
    <div id="mainPanel" class="glass-panel">
        <div class="panel-drag-handle"></div>
        
        <div class="p-6 pb-2">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 rounded-[20px] bg-emerald-600 flex justify-center items-center text-white shadow-[0_10px_20px_rgba(16,185,129,0.4)] relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-tr from-emerald-500 to-teal-400 opacity-90"></div>
                        <i class="fa-solid fa-leaf text-3xl relative z-10 animate-float"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-black text-gray-800 font-outfit tracking-tight">Navi<span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-teal-500">Max</span> <span class="text-[11px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-black uppercase align-middle border border-emerald-200">V6 Green</span></h1>
                        <p class="text-[12px] text-emerald-600 font-black uppercase tracking-[0.2em] mt-0.5">Eco Routing System</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button id="clearAllBtn" class="w-12 h-12 bg-gray-100 text-gray-600 rounded-full flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition text-lg border border-gray-200" title="রিসেট">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    <button onclick="togglePanel()" class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center hover:bg-emerald-100 transition text-lg border border-emerald-100" title="লুকান">
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                </div>
            </div>

            <!-- ট্রাভেল মোড সুইচ -->
            <div class="travel-mode-container mb-5">
                <div class="travel-mode-btn active" data-mode="driving" onclick="setTravelMode('driving', this)"><i class="fa-solid fa-car"></i></div>
                <div class="travel-mode-btn" data-mode="cycling" onclick="setTravelMode('cycling', this)"><i class="fa-solid fa-motorcycle"></i></div>
                <div class="travel-mode-btn" data-mode="foot" onclick="setTravelMode('foot', this)"><i class="fa-solid fa-person-walking"></i></div>
            </div>
            
            <!-- Quick Explore Categories -->
            <div class="flex gap-3 overflow-x-auto pb-3 scrollbar-hide mb-2">
                <div class="explore-chip" onclick="findNearby('restaurant')"><i class="fa-solid fa-burger text-orange-500 text-lg"></i> রেস্টুরেন্ট</div>
                <div class="explore-chip" onclick="findNearby('hospital')"><i class="fa-solid fa-hospital text-red-500 text-lg"></i> হাসপাতাল</div>
                <div class="explore-chip" onclick="findNearby('atm')"><i class="fa-solid fa-money-bill-1-wave text-green-600 text-lg"></i> এটিএম</div>
                <div class="explore-chip" onclick="findNearby('fuel')"><i class="fa-solid fa-gas-pump text-blue-500 text-lg"></i> পাম্প</div>
            </div>
        </div>

        <div class="px-6 pb-6 space-y-4 relative z-50">
            <div class="flex items-center gap-3 mb-2 bg-emerald-50/80 p-2.5 rounded-2xl w-max border border-emerald-200 cursor-pointer shadow-sm" onclick="toggleStartInput()">
                <div class="w-8 h-8 rounded-full bg-emerald-200 text-emerald-700 flex items-center justify-center text-sm"><i class="fa-solid fa-location-arrow"></i></div>
                <span id="startLocationText" class="text-[15px] font-black text-emerald-800 pr-2">আমার বর্তমান অবস্থান</span>
                <i class="fa-solid fa-pen text-[11px] text-emerald-500 pr-2"></i>
            </div>

            <div id="startInputContainer" class="hidden relative">
                <div class="search-input-box">
                    <i class="fa-solid fa-circle text-emerald-500 mr-3 text-lg"></i>
                    <input type="text" id="startInput" placeholder="শুরুর স্থান লিখুন" autocomplete="off">
                </div>
                <div id="startResults" class="absolute w-full bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl top-full mt-2 max-h-60 overflow-y-auto hidden z-[60] border border-gray-100"></div>
            </div>

            <div class="relative">
                <div class="search-input-box bg-white border-2 border-emerald-200 shadow-sm">
                    <i class="fa-solid fa-location-dot text-rose-500 mr-3 text-2xl animate-bounce"></i>
                    <input type="text" id="destInput" placeholder="কোথায় যাবেন? (গন্তব্য)" autocomplete="off">
                </div>
                <div id="destResults" class="absolute w-full bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl top-full mt-2 max-h-60 overflow-y-auto hidden z-[60] border border-gray-100"></div>
            </div>

            <button id="findRouteBtn" class="w-full mt-4 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white py-5 rounded-2xl font-black shadow-[0_10px_25px_rgba(16,185,129,0.3)] flex items-center justify-center gap-3 text-xl group transition-all">
                <i class="fa-solid fa-diamond-turn-right text-2xl group-hover:translate-x-1 transition-transform"></i> রুট বের করুন
            </button>
        </div>

        <!-- রুট ইনফরমেশন বক্স -->
        <div id="routeInfoPanel" class="hidden flex-col bg-white border-t border-gray-100 rounded-b-[36px] overflow-hidden">
            <div class="p-6 bg-emerald-50/50 flex flex-col gap-4 border-b border-emerald-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[12px] font-black text-emerald-600 uppercase tracking-[0.2em] mb-1">এস্টিমেটেড ট্রিপ</p>
                        <div class="flex items-baseline gap-2">
                            <span id="routeTime" class="text-5xl font-black text-gray-800 font-outfit tracking-tighter">--</span>
                            <span class="text-gray-300 font-light text-4xl">/</span>
                            <span id="routeDist" class="text-2xl font-bold text-gray-500 font-outfit">--</span>
                        </div>
                    </div>
                    <div id="routeModeIcon" class="w-16 h-16 bg-white border-2 border-emerald-100 rounded-[24px] flex items-center justify-center text-emerald-500 text-3xl shadow-sm">
                        <i class="fa-solid fa-car-side"></i>
                    </div>
                </div>
            </div>

            <div id="routeDetailsBox" class="p-5 space-y-3 bg-white max-h-[30vh] overflow-y-auto scrollbar-hide">
                <!-- Route steps generated via JS -->
            </div>
            
            <div class="p-5 bg-gray-50 border-t border-gray-100 flex gap-3">
                <button id="startNavBtn" class="flex-1 bg-[#4285F4] hover:bg-[#3367D6] text-white py-4 rounded-2xl font-black text-[16px] flex items-center justify-center gap-2 shadow-lg transition">
                    <i class="fa-brands fa-google text-xl"></i> Google Maps-এ যান
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- Variables & State ---
        let map, routingControl;
        let myLat = null, myLng = null, userMarker = null;
        let startLat = null, startLng = null, startMarker = null;
        let destLat = null, destLng = null, destMarker = null;
        let currentMode = 'live'; 
        let currentTravelMode = 'driving';
        let clickedLat = null, clickedLng = null;
        let tempMarkers = [];

        // Layers - Added Terrain and OSM back
        const layers = {
            street: L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }),
            satellite: L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }),
            hybrid: L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }),
            terrain: L.tileLayer('http://{s}.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }),
            osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }),
            dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 })
        };
        let activeLayer = layers.street;

        // Icons - Changed theme to Emerald/Green
        const createCustomIcon = (iconClass, colorClass) => {
            return L.divIcon({ 
                className: '', 
                html: `<div class="custom-marker text-5xl ${colorClass} text-center" style="margin-top:-48px; margin-left:-24px; width:48px; height:48px; display:flex; justify-content:center; align-items:flex-end; filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3));"><i class="${iconClass}"></i></div>`, 
                iconSize: [0, 0], iconAnchor: [0, 0] 
            });
        };
        const startIcon = createCustomIcon('fa-solid fa-location-dot', 'text-emerald-600');
        const destIcon = createCustomIcon('fa-solid fa-location-dot', 'text-rose-500');
        const userIcon = L.divIcon({ className: '', html: `<div class="user-pulse-container" style="margin-top:-22px; margin-left:-22px;"><div class="pulse-ring"></div><div class="pulse-loc"></div></div>`, iconSize: [0, 0], iconAnchor: [0, 0] });

        // --- Initialization ---
        window.onload = () => {
            map = L.map('map', { center: [23.8103, 90.4125], zoom: 7, layers: [activeLayer], zoomControl: false, zoomAnimation: true });
            showToast("V6 ন্যাচারাল গ্রিন লোড হচ্ছে...");

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        myLat = pos.coords.latitude; myLng = pos.coords.longitude;
                        if(pos.coords.speed > 0) {
                            document.getElementById('speedValue').innerText = (pos.coords.speed * 3.6).toFixed(1);
                            document.getElementById('speedometer').classList.add('show');
                        }
                        if(currentMode === 'live') { startLat = myLat; startLng = myLng; }
                        
                        if(userMarker) userMarker.setLatLng([myLat, myLng]);
                        else {
                            userMarker = L.marker([myLat, myLng], {icon: userIcon, zIndexOffset: 1000}).addTo(map);
                            map.flyTo([myLat, myLng], 15, { duration: 2 });
                            fetchWeather(myLat, myLng);
                        }
                    },
                    (err) => console.log(err), { enableHighAccuracy: true }
                );
            }

            // The Magic Map Click Event
            map.on('click', async function(e) {
                clickedLat = e.latlng.lat; clickedLng = e.latlng.lng;
                
                const tempIcon = L.divIcon({ className: '', html: '<div class="text-4xl text-blue-500" style="margin-top:-40px; margin-left:-20px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.4)); animation: bounce 0.5s;"><i class="fa-solid fa-location-pin"></i></div>', iconSize: [0,0]});
                tempMarkers.forEach(m => map.removeLayer(m));
                const marker = L.marker([clickedLat, clickedLng], {icon: tempIcon}).addTo(map);
                tempMarkers.push(marker);
                map.flyTo([clickedLat, clickedLng], map.getZoom(), {animate: true});

                document.getElementById('placeNameTitle').innerText = "খোঁজা হচ্ছে...";
                document.getElementById('placeAddress').innerText = `${clickedLat.toFixed(4)}, ${clickedLng.toFixed(4)}`;
                document.getElementById('placeDetailSheet').classList.add('show');

                try {
                    let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${clickedLat}&lon=${clickedLng}&zoom=18&addressdetails=1&accept-language=bn`);
                    let data = await res.json();
                    if(data && data.display_name) {
                        let name = data.name || data.address.suburb || data.address.city || data.address.village || "অজানা স্থান";
                        document.getElementById('placeNameTitle').innerText = name;
                        document.getElementById('placeAddress').innerText = data.display_name;
                    } else {
                        document.getElementById('placeNameTitle').innerText = "নাম পাওয়া যায়নি";
                    }
                } catch(e) {}
            });
        };

        // --- Core Functions ---
        async function fetchWeather(lat, lng) {
            try {
                let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
                let data = await res.json();
                document.getElementById('tempValue').innerText = `${data.current_weather.temperature}°C`;
            } catch(e){}
        }

        let is3D = false;
        function toggle3D() {
            const mapContainer = document.getElementById('map');
            const btn = document.getElementById('btn3D');
            is3D = !is3D;
            if(is3D) {
                mapContainer.classList.add('map-3d-mode');
                btn.classList.add('active-3d');
                showToast("3D মোড চালু হয়েছে");
            } else {
                mapContainer.classList.remove('map-3d-mode');
                btn.classList.remove('active-3d');
            }
        }

        function openStreetView() {
            if(!clickedLat) return;
            const url = `http://maps.google.com/maps?q=&layer=c&cbll=${clickedLat},${clickedLng}`;
            window.open(url, '_blank');
        }

        function closePlaceDetails() {
            document.getElementById('placeDetailSheet').classList.remove('show');
            tempMarkers.forEach(m => map.removeLayer(m));
        }

        function setClickedAs(type) {
            let name = document.getElementById('placeNameTitle').innerText;
            setLocation(type, clickedLat, clickedLng, name);
            if(type === 'start') {
                document.getElementById('startInputContainer').classList.remove('hidden');
                document.getElementById('startLocationText').innerText = "কাস্টম শুরুর স্থান";
                document.getElementById('startInput').value = name;
                currentMode = 'custom';
            } else {
                document.getElementById('destInput').value = name;
            }
            closePlaceDetails();
            if(startLat && destLat) document.getElementById('findRouteBtn').click();
        }

        async function findNearby(type) {
            if(!myLat) { showToast("আপনার লোকেশন প্রয়োজন"); return; }
            showToast(`${type} খোঁজা হচ্ছে...`);
            try {
                let query = type === 'restaurant' ? 'restaurant|food' : type === 'hospital' ? 'hospital|clinic' : type === 'atm' ? 'atm|bank' : 'fuel|gas';
                let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=10&lat=${myLat}&lon=${myLng}&radius=5000`);
                let data = await res.json();
                
                tempMarkers.forEach(m => map.removeLayer(m));
                if(data.length === 0) { showToast("আশেপাশে কিছু পাওয়া যায়নি"); return; }

                data.forEach(place => {
                    let iconHTML = type === 'restaurant' ? '<i class="fa-solid fa-burger text-orange-500"></i>' : 
                                   type === 'hospital' ? '<i class="fa-solid fa-hospital text-red-500"></i>' : 
                                   type === 'atm' ? '<i class="fa-solid fa-money-bill-1-wave text-green-600"></i>' :
                                   '<i class="fa-solid fa-gas-pump text-blue-500"></i>';
                    
                    const mIcon = L.divIcon({ className: '', html: `<div class="text-3xl bg-white rounded-2xl w-12 h-12 flex items-center justify-center shadow-xl border-2 border-emerald-100">${iconHTML}</div>`, iconSize: [48,48]});
                    const marker = L.marker([place.lat, place.lon], {icon: mIcon}).addTo(map);
                    marker.bindPopup(`<b class="font-outfit text-[15px]">${place.name}</b><br><button onclick="setLocation('dest', ${place.lat}, ${place.lon}, '${place.name.replace(/'/g, "")}'); document.getElementById('destInput').value='${place.name.replace(/'/g, "")}';" class="mt-2 w-full bg-emerald-500 text-white font-bold px-3 py-2 rounded-xl text-sm shadow-md">এখানে যান</button>`);
                    tempMarkers.push(marker);
                });
                
                const group = new L.featureGroup(tempMarkers);
                map.fitBounds(group.getBounds().pad(0.5));
                showToast(`${data.length} টি স্থান পাওয়া গেছে`);

            } catch(e) { showToast("সার্ভার সমস্যা"); }
        }

        // Search Handlers & Modals 
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerHTML = `<i class="fa-solid fa-bell text-yellow-300"></i> <span>${msg}</span>`;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500);
        }
        function togglePanel() {
            const p = document.getElementById('mainPanel'), b = document.getElementById('panelOpenBtn');
            if(p.classList.contains('hidden-panel')) { p.classList.remove('hidden-panel'); b.classList.remove('show'); }
            else { p.classList.add('hidden-panel'); b.classList.add('show'); }
        }
        function toggleStartInput() {
            const c = document.getElementById('startInputContainer');
            if(c.classList.contains('hidden')) { c.classList.remove('hidden'); document.getElementById('startLocationText').innerText = "কাস্টম শুরুর স্থান"; currentMode = 'custom'; startLat = null; startLng = null;}
            else { c.classList.add('hidden'); document.getElementById('startLocationText').innerText = "আমার বর্তমান অবস্থান"; currentMode = 'live'; startLat = myLat; startLng = myLng; document.getElementById('startInput').value='';}
        }
        function closeModals() {
            document.getElementById('layerModal').classList.remove('show');
            document.getElementById('layerModal').classList.add('hidden');
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('layerModalContent').classList.remove('scale-100', 'opacity-100');
            document.getElementById('layerModalContent').classList.add('scale-90', 'opacity-0');
        }
        document.querySelector('.map-fab[title="ম্যাপ স্টাইল"]').onclick = function() {
            document.getElementById('layerModal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('layerModalContent').classList.remove('scale-90', 'opacity-0'); document.getElementById('layerModalContent').classList.add('scale-100', 'opacity-100'); }, 10);
            document.getElementById('overlay').classList.add('show');
        };
        function setMapStyle(styleName, el) {
            map.removeLayer(activeLayer); activeLayer = layers[styleName]; map.addLayer(activeLayer);
            document.querySelectorAll('#layerModalContent > div > div').forEach(d => { d.classList.remove('border-emerald-500', 'shadow-[0_0_0_4px_rgba(16,185,129,0.2)]'); d.classList.add('border-transparent'); });
            el.classList.remove('border-transparent'); el.classList.add('border-emerald-500', 'shadow-[0_0_0_4px_rgba(16,185,129,0.2)]');
            setTimeout(closeModals, 300);
        }
        function locateMe() { if(myLat) map.flyTo([myLat, myLng], 16); else showToast("লোকেশন লোড হচ্ছে"); }

        // Core Location Setter
        function setLocation(type, lat, lng, name) {
            if(type === 'start') {
                startLat = lat; startLng = lng;
                if(startMarker) map.removeLayer(startMarker);
                startMarker = L.marker([lat, lng], {icon: startIcon, draggable: true}).addTo(map);
                startMarker.on('dragend', function(e) { const pos = e.target.getLatLng(); startLat = pos.lat; startLng = pos.lng; document.getElementById('startInput').value = "পিন করা স্থান"; if(destLat) document.getElementById('findRouteBtn').click(); });
            } else {
                destLat = lat; destLng = lng;
                if(destMarker) map.removeLayer(destMarker);
                destMarker = L.marker([lat, lng], {icon: destIcon, draggable: true}).addTo(map);
                destMarker.on('dragend', function(e) { const pos = e.target.getLatLng(); destLat = pos.lat; destLng = pos.lng; document.getElementById('destInput').value = "পিন করা গন্তব্য"; if(startLat) document.getElementById('findRouteBtn').click(); });
            }
        }

        // Setup Routing (Green Theme)
        document.getElementById('findRouteBtn').addEventListener('click', () => {
            if(currentMode === 'live' && !myLat) { showToast("লোকেশন পাওয়া যায়নি!"); return; }
            if(currentMode === 'custom' && !startLat) { showToast("শুরুর স্থান দিন!"); return; }
            if(!destLat) { showToast("গন্তব্য দিন!"); return; }

            const btn = document.getElementById('findRouteBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-2xl"></i> ক্যালকুলেট হচ্ছে...';
            if(routingControl) map.removeControl(routingControl);

            let profile = currentTravelMode === 'foot' ? 'walking' : currentTravelMode; 
            let routeColor = currentTravelMode === 'driving' ? '#10b981' : currentTravelMode === 'cycling' ? '#0ea5e9' : '#8b5cf6'; // Driving is green now

            routingControl = L.Routing.control({
                waypoints: [ L.latLng(startLat, startLng), L.latLng(destLat, destLng) ],
                router: L.Routing.osrmv1({ serviceUrl: `https://router.project-osrm.org/route/v1` }),
                profile: profile,
                lineOptions: { styles: [{ color: 'white', weight: 12, opacity: 0.9 }, { color: routeColor, weight: 7, opacity: 1 }] },
                createMarker: function() { return null; }, show: false, fitSelectedRoutes: true
            }).addTo(map);

            routingControl.on('routesfound', function(e) {
                const summary = e.routes[0].summary;
                document.getElementById('routeDist').innerText = (summary.totalDistance / 1000).toFixed(1) + " km";
                const timeMin = Math.round(summary.totalTime / 60);
                document.getElementById('routeTime').innerHTML = timeMin > 60 ? `<span>${Math.floor(timeMin/60)}</span><span class="text-2xl">h</span> <span>${timeMin%60}</span><span class="text-2xl">m</span>` : `<span>${timeMin}</span><span class="text-2xl">min</span>`;
                
                const detailsBox = document.getElementById('routeDetailsBox'); detailsBox.innerHTML = '';
                e.routes[0].instructions.forEach((inst, index) => {
                    if(index === 0 || index === e.routes[0].instructions.length - 1) return;
                    let icon = 'fa-arrow-up', color = 'text-gray-600';
                    if(inst.type === 'Left' || inst.modifier === 'Left') { icon = 'fa-arrow-turn-left'; color = 'text-blue-500'; }
                    if(inst.type === 'Right' || inst.modifier === 'Right') { icon = 'fa-arrow-turn-right'; color = 'text-emerald-500'; }
                    let stepDist = inst.distance > 1000 ? (inst.distance/1000).toFixed(1) + ' km' : Math.round(inst.distance) + ' m';
                    detailsBox.innerHTML += `<div class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 mb-3"><div class="w-12 h-12 bg-white rounded-xl flex justify-center items-center shrink-0 border border-gray-200 shadow-sm"><i class="fa-solid ${icon} ${color} text-xl"></i></div><div class="flex-1"><p class="text-[15px] font-bold text-gray-800">${inst.text}</p><p class="text-[13px] font-bold text-gray-400 mt-1">${stepDist}</p></div></div>`;
                });

                document.getElementById('routeInfoPanel').classList.remove('hidden'); document.getElementById('routeInfoPanel').classList.add('flex');
                btn.innerHTML = '<i class="fa-solid fa-check text-2xl"></i> রুট তৈরি হয়েছে';
                setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-rotate-right text-2xl"></i> রুট আপডেট করুন'; }, 2000);
            });
        });

        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if(routingControl) map.removeControl(routingControl);
            document.getElementById('routeInfoPanel').classList.add('hidden'); document.getElementById('routeInfoPanel').classList.remove('flex');
            document.getElementById('destInput').value = ''; destLat = null; destLng = null;
            if(destMarker) map.removeLayer(destMarker);
            tempMarkers.forEach(m => map.removeLayer(m));
            if(myLat) map.flyTo([myLat, myLng], 14);
            document.getElementById('findRouteBtn').innerHTML = '<i class="fa-solid fa-diamond-turn-right text-2xl"></i> রুট বের করুন';
        });

        document.getElementById('startNavBtn').addEventListener('click', () => {
            let mode = currentTravelMode === 'cycling' ? 'bicycling' : currentTravelMode === 'foot' ? 'walking' : 'driving';
            window.open(`https://www.google.com/maps/dir/?api=1&origin=${startLat},${startLng}&destination=${destLat},${destLng}&travelmode=${mode}`, '_blank');
        });

        function setTravelMode(mode, el) {
            currentTravelMode = mode;
            document.querySelectorAll('.travel-mode-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            const iconClass = mode === 'driving' ? 'fa-car' : mode === 'cycling' ? 'fa-motorcycle' : 'fa-person-walking';
            document.getElementById('routeModeIcon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
            if(routingControl) document.getElementById('findRouteBtn').click();
        }
        
        // Setup Search
        function setupSearch(inputId, resultsId, type) {
            const input = document.getElementById(inputId), results = document.getElementById(resultsId); let timeout;
            input.addEventListener('input', (e) => {
                clearTimeout(timeout); const query = e.target.value;
                if(query.length < 2) { results.classList.add('hidden'); return; }
                timeout = setTimeout(async () => {
                    results.innerHTML = '<div class="p-4 text-center text-emerald-500 font-bold"><i class="fa-solid fa-spinner fa-spin"></i> খুঁজছি...</div>'; results.classList.remove('hidden');
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=bd&accept-language=bn`);
                        const data = await res.json(); results.innerHTML = '';
                        if(data.length === 0) { results.innerHTML = '<div class="p-4 text-center text-red-500 font-bold">কিছু পাওয়া যায়নি।</div>'; return; }
                        data.forEach(place => {
                            const div = document.createElement('div'); div.className = "p-4 hover:bg-emerald-50 cursor-pointer border-b border-gray-100 flex items-center gap-4 transition";
                            div.innerHTML = `<div class="w-10 h-10 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 shrink-0"><i class="fa-solid fa-location-dot"></i></div><div><p class="text-[16px] font-black text-gray-800 line-clamp-1">${place.name}</p><p class="text-[12px] font-bold text-gray-400 mt-1 line-clamp-1">${place.display_name}</p></div>`;
                            div.onclick = () => { input.value = place.name; results.classList.add('hidden'); setLocation(type, parseFloat(place.lat), parseFloat(place.lon), place.name); };
                            results.appendChild(div);
                        });
                    } catch(e) {}
                }, 800);
            });
            document.addEventListener('click', (e) => { if(!input.contains(e.target) && !results.contains(e.target)) results.classList.add('hidden'); });
        }
        setupSearch('startInput', 'startResults', 'start'); setupSearch('destInput', 'destResults', 'dest');

    </script>
</body>
